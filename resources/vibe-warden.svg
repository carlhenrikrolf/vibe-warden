<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mask cuts the eyes, mouth, and a lock-shaped halo out of the robot head
       so the padlock (drawn on top) reads as in front, not merged. -->
  <mask id="vw-head" maskUnits="userSpaceOnUse" x="0" y="0" width="24" height="24">
    <rect width="24" height="24" fill="white"/>
    <circle cx="6.6" cy="9" r="1.4" fill="black"/>
    <circle cx="11.4" cy="9" r="1.4" fill="black"/>
    <rect x="6.3" y="11.6" width="5.4" height="1.3" fill="black"/>
    <rect x="10.6" y="13.3" width="9.8" height="8.4" rx="2" fill="black"/>
    <rect x="12.7" y="10.4" width="5.8" height="4.2" rx="1" fill="black"/>
  </mask>

  <g mask="url(#vw-head)" fill="currentColor">
    <rect x="3.5" y="5" width="11" height="9.5"/>
    <rect x="8.4" y="2.9" width="1.2" height="2.3"/>
    <circle cx="9" cy="2.4" r="1.1"/>
    <rect x="2.3" y="8" width="1.2" height="3"/>
    <rect x="14.5" y="8" width="1.2" height="3"/>
  </g>

  <!-- Padlock, on top of the head. -->
  <path d="M13.7 14 V12.6 A1.85 1.85 0 0 1 17.3 12.6 V14"
        fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <path fill-rule="evenodd" fill="currentColor"
        d="M12.8 14 H18.2 A1.5 1.5 0 0 1 19.7 15.5 V19.5 A1.5 1.5 0 0 1 18.2 21
           H12.8 A1.5 1.5 0 0 1 11.3 19.5 V15.5 A1.5 1.5 0 0 1 12.8 14 Z
           M15.5 16.1 A0.9 0.9 0 1 0 15.5 17.9 A0.9 0.9 0 1 0 15.5 16.1 Z"/>
</svg>
